name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev", "feature/app" ]

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-app
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Build with Maven
      run: mvn clean compile
    - name: Upload source
      uses: actions/upload-artifact@v4
      with:
        name: source
        path: devops-app/

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: devops-app
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Run Unit Tests
      run: mvn -Dtest=!SeleniumTest test
    - name: Package JAR
      run: mvn -DskipTests package
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: devops-app/target/*.jar
        retention-days: 5

  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest ./devops-app
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    steps:
    - name: Deploying to Render
      run: echo "✅ Docker image pushed to Docker Hub. Render auto-deploys from latest image."
    - name: Live URL
      run: echo "🌐 Live at https://devops-app-49qd.onrender.com"
