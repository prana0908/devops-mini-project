name: CI Pipeline

on:
  push:
    branches: [ "main", "dev", "feature/app" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven
      run: ./mvnw clean install
      working-directory: devops-app

    - name: Run Tests
      run: ./mvnw test
      working-directory: devops-app
