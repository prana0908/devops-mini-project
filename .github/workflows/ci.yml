name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev", "feature/devops-setup","feature/*" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-app
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Build with Maven
      run: mvn clean compile

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: devops-app
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'


    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2    
          
          
          
    - name: Run Unit Tests
      run: mvn -Dtest=!SeleniumTest test
    - name: Package JAR
      run: mvn -DskipTests package
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: devops-app/target/surefire-reports/
        retention-days: 5

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: JUnit Test Results
        path: devops-app/target/surefire-reports/*.xml
        reporter: java-junit

  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest ./devops-app
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploying to Render
      run: echo "✅ Docker image pushed. Render auto-deploys!"
    - name: Live URL
      run: echo "🌐 Live at https://devops-app-49qd.onrender.com"